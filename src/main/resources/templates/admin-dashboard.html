<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <style>
        /* Keep your existing body/table styles, add these: */
        .modal { display: none; position: fixed; z-index: 1; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.4); }
        .modal-content { background-color: #fefefe; margin: 10% auto; padding: 20px; border: 1px solid #888; width: 400px; border-radius: 8px; }
        tr { cursor: pointer; } /* Indicates clickable rows */
    </style>
</head>
<body>
    <div class="header">
        <a href="/" class="admin-link">← Back to Registration</a>
        <button onclick="document.getElementById('filterModal').style.display='block'">Filter</button>
    </div>

    <div class="table-container">
        <h2>Registered Students</h2>
        <table id="studentTable">
            <thead>
                <tr><th>Name</th><th>Course</th></tr>
            </thead>
            <tbody id="tableBody">
                <tr th:each="student : ${students}" th:onclick="'showDetails(' + ${student.id} + ')'">
                    <td th:text="${student.name}"></td>
                    <td th:text="${student.course}"></td>
                </tr>
            </tbody>
        </table>
    </div>

    <div id="filterModal" class="modal">
        <div class="modal-content">
            <h3>Select Courses</h3>
            <input type="checkbox" value="Computer Science &amp Engineering"> Computer Science &amp Engineering<br>
            <input type="checkbox" value="Electronics &amp Communication Engineering"> Electronics &amp Communication Engineering<br>
            <input type="checkbox" value="Electrical &amp Electronics Engineering"> Electrical &amp Electronics Engineering<br>
            <input type="checkbox" value="Civil Engineering"> Civil Engineering<br>
            <input type="checkbox" value="Mechanical Engineering"> Mechanical Engineering<br>
            <button onclick="applyFilter()">Apply</button>
        </div>
    </div>

    <div id="detailsModal" class="modal">
        <div class="modal-content">
            <h3>Student Details</h3>
            <div id="detailsContent"></div>
            <button onclick="document.getElementById('detailsModal').style.display='none'">Close</button>
        </div>
    </div>

    <script>
        function applyFilter() {
            // 1. Get checked values
            // 2. Fetch /admin/students/filter?courses=...
            // 3. Clear #tableBody and append new rows
        }

        function showDetails(id) {
            // 1. Fetch /api/students/{id}
            // 2. Populate #detailsContent and show #detailsModal
        }
    </script>
</body>
</html>
