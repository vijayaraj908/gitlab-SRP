<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" th:href="@{/dashboard.css}">
</head>
<body>
    <div class="header">
        <a href="/" class="admin-link">← Back to Registration</a>
        <div class="header-actions">
            <button id="removeFilterBtn" class="remove-btn" style="display:none;" onclick="removeFilter()">Remove Filter</button>
            <button class="filter-btn" onclick="document.getElementById('filterModal').style.display='block'">Filter</button>
        </div>
    </div>

    <div class="table-container">
        <h2>Registered Students</h2>
        <table id="studentTable">
            <thead>
                <tr><th>Name</th><th>Course</th></tr>
            </thead>
            <tbody id="tableBody">
                <tr th:if="${students != null}" th:each="student : ${students}" 
                    th:attr="onclick='showDetails(' + ${student.id} + ')'"
                    style="cursor: pointer;">
                    <td th:text="${student.name != null ? student.name : 'N/A'}">Name</td>
                    <td th:text="${student.course != null ? student.course : 'N/A'}">Course</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div id="filterModal" class="modal">
        <div class="modal-content">
            <h3>Filter by Course</h3>
            <div class="checkbox-group">
                <label><input type="checkbox" value="Computer Science and Engineering"> Computer Science and Engineering</label>
                <label><input type="checkbox" value="Electronics and Communication Engineering"> Electronics and Communication Engineering</label>
                <label><input type="checkbox" value="Electrical and Electronics Engineering"> Electrical and Electronics Engineering</label>
                <label><input type="checkbox" value="Civil Engineering"> Civil Engineering</label>
                <label><input type="checkbox" value="Mechanical Engineering"> Mechanical Engineering</label>
            </div>
            <div class="modal-actions">
                <button onclick="applyFilter()">Apply</button>
                <button onclick="document.getElementById('filterModal').style.display='none'">Cancel</button>
            </div>
        </div>
    </div>

    <div id="detailsModal" class="modal">
        <div class="modal-content">
            <h3>Student Details</h3>
            <div id="detailsContent"></div>
            <button onclick="document.getElementById('detailsModal').style.display='none'">Close</button>
        </div>
    </div>

    <script>
        function applyFilter() {
            const checkboxes = document.querySelectorAll('input[type="checkbox"]:checked');
            if (checkboxes.length === 0) return;

            const courses = Array.from(checkboxes).map(cb => cb.value);
            fetch('/admin/students/filter?courses=' + encodeURIComponent(courses.join(',')))
                .then(response => response.json())
                .then(students => {
                    updateTable(students);
                    document.getElementById('removeFilterBtn').style.display = 'inline-block';
                    document.getElementById('filterModal').style.display = 'none';
                });
        }

        function removeFilter() {
            document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
            fetch('/admin/students/all')
                .then(response => response.json())
                .then(students => {
                    updateTable(students);
                    document.getElementById('removeFilterBtn').style.display = 'none';
                });
        }

        function updateTable(students) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            students.forEach(student => {
                tbody.innerHTML += `<tr onclick="showDetails(${student.id})" style="cursor: pointer;">
                    <td>${student.name}</td>
                    <td>${student.course}</td>
                </tr>`;
            });
        }

        function showDetails(id) {
            fetch('/api/students/' + id)
                .then(response => response.json())
                .then(data => {
                    document.getElementById('detailsContent').innerHTML = `
                        <p><strong>Name:</strong> ${data.name}</p>
                        <p><strong>Course:</strong> ${data.course}</p>
                    `;
                    document.getElementById('detailsModal').style.display = 'block';
                });
        }
    </script>
</body>
</html>
