<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <style>
        .modal { display: none; position: fixed; z-index: 1; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.4); }
        .modal-content { background-color: #fefefe; margin: 10% auto; padding: 20px; border: 1px solid #888; width: 400px; border-radius: 8px; }
        tr { cursor: pointer; }
        .header { margin-bottom: 20px; }
        .table-container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05); max-width: 1000px; margin: 0 auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; border-bottom: 1px solid #e2e8f0; text-align: left; }
    </style>
</head>
<body>
    <div class="header">
        <a href="/" class="admin-link">← Back to Registration</a>
        <button onclick="document.getElementById('filterModal').style.display='block'">Filter</button>
    </div>

    <div class="table-container">
        <h2>Registered Students</h2>
        <table id="studentTable">
            <thead>
                <tr><th>Name</th><th>Course</th></tr>
            </thead>
            <tbody id="tableBody">
    <tr th:if="${students != null}" th:each="student : ${students}" 
        th:attr="onclick='showDetails(' + ${student.id} + ')'"
        style="cursor: pointer;">
        <td th:text="${student.name != null ? student.name : 'N/A'}">Name</td>
        <td th:text="${student.course != null ? student.course : 'N/A'}">Course</td>
    </tr>
</tbody>
        </table>
    </div>

   <div id="filterModal" class="modal">
        <div class="modal-content">
            <h3>Select Courses</h3>
            <input type="checkbox" value="Computer Science and Engineering"> Computer Science and Engineering<br/>
            <input type="checkbox" value="Electronics and Communication Engineering"> Electronics and Communication Engineering<br/>
            <input type="checkbox" value="Electrical and Electronics Engineering"> Electrical and Electronics Engineering<br/>
            <input type="checkbox" value="Civil Engineering"> Civil Engineering<br/>
            <input type="checkbox" value="Mechanical Engineering"> Mechanical Engineering<br/>
            <button onclick="applyFilter()">Apply</button>
            <button onclick="document.getElementById('filterModal').style.display='none'">Cancel</button>
        </div>
    </div>

    <div id="detailsModal" class="modal">
        <div class="modal-content">
            <h3>Student Details</h3>
            <div id="detailsContent"></div>
            <button onclick="document.getElementById('detailsModal').style.display='none'">Close</button>
        </div>
    </div>

    <script>
        function applyFilter() {
            const checkboxes = document.querySelectorAll('input[type="checkbox"]:checked');
            const courses = Array.from(checkboxes).map(cb => cb.value);

            fetch('/admin/students/filter?courses=' + encodeURIComponent(courses.join(',')))
                .then(response => response.json())
                .then(students => {
                    const tbody = document.getElementById('tableBody');
                    tbody.innerHTML = '';
                    students.forEach(student => {
                        tbody.innerHTML += `<tr onclick="showDetails(${student.id})">
                            <td>${student.name}</td>
                            <td>${student.course}</td>
                        </tr>`;
                    });
                    document.getElementById('filterModal').style.display = 'none';
                });
        }

        function showDetails(id) {
            fetch('/api/students/' + id)
                .then(response => response.json())
                .then(data => {
                    document.getElementById('detailsContent').innerHTML = `
                        <p><strong>Name:</strong> ${data.name}</p>
                        <p><strong>Age:</strong> ${data.age}</p>
                        <p><strong>Email:</strong> ${data.email}</p>
                        <p><strong>Phone:</strong> ${data.phone}</p>
                        <p><strong>Course:</strong> ${data.course}</p>
                    `;
                    document.getElementById('detailsModal').style.display = 'block';
                });
        }
    </script>
</body>
</html>
